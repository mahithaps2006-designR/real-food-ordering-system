<!DOCTYPE html>
<html>
<head>
<title>Food Ordering System</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
margin-top:15px;
}

a{
display:block;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text"
name="username"
placeholder="Username"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<a href="{% url 'register' %}">
Create Account
</a>

</div>

</body>
</html>
