<!DOCTYPE html>
<html>
<head>

<title>{{ hotel.name }}</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

.food-container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.food-card{
background:white;
width:280px;
border-radius:10px;
box-shadow:0 0 10px gray;
overflow:hidden;
}

.food-card img{
width:100%;
height:200px;
object-fit:cover;
}

.food-info{
padding:15px;
}

button{
background:green;
color:white;
border:none;
padding:10px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<h1>{{ hotel.name }} Menu</h1>

<div class="food-container">

{% for item in menu_items %}

<div class="food-card">

<img src="{{ item.image.url }}">

<div class="food-info">

<h2>{{ item.name }}</h2>

<p>{{ item.description }}</p>

<h3>₹ {{ item.price }}</h3>

<a href="{% url 'add_to_cart' item.id %}">
<button>
Add To Cart
</button>
</a>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
