<!DOCTYPE html>
<html>
<head>

<title>Hotels</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.hotel-container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.hotel-card{
background:white;
width:300px;
border-radius:10px;
box-shadow:0 0 10px gray;
overflow:hidden;
}

.hotel-card img{
width:100%;
height:200px;
object-fit:cover;
}

.hotel-info{
padding:15px;
}

.btn{
display:inline-block;
background:green;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Select Your Hotel</h1>

<div class="hotel-container">

{% for hotel in hotels %}

<div class="hotel-card">

<img src="{{ hotel.image.url }}">

<div class="hotel-info">

<h2>{{ hotel.name }}</h2>

<p>{{ hotel.address }}</p>

<p>⭐ {{ hotel.rating }}</p>

<a href="{% url 'menu' hotel.id %}"
   class="btn">
View Menu
</a>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
