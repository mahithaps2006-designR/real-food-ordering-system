<!DOCTYPE html>
<html>
<head>

<title>Cart</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid gray;
text-align:center;
}

.btn{
padding:8px 15px;
background:red;
color:white;
text-decoration:none;
}

.checkout{
background:green;
padding:12px 20px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<h1>Your Cart</h1>

<table>

<tr>
<th>Food</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>

{% for item in cart_items %}

<tr>

<td>
{{ item.menu_item.name }}
</td>

<td>
₹ {{ item.menu_item.price }}
</td>

<td>
{{ item.quantity }}
</td>

<td>
₹ {% widthratio item.menu_item.price 1 item.quantity %}
</td>

<td>

<a class="btn"
href="{% url 'remove_cart' item.id %}">
Remove
</a>

</td>

</tr>

{% endfor %}

</table>

<h2>
Grand Total : ₹ {{ total }}
</h2>

<a class="checkout"
href="{% url 'checkout' %}">
Proceed To Checkout
</a>

</body>
</html>
