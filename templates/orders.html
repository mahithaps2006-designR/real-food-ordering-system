<!DOCTYPE html>
<html>
<head>

<title>My Orders</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#4CAF50;
color:white;
}

h1{
text-align:center;
}

.btn{
display:inline-block;
padding:10px 15px;
background:green;
color:white;
text-decoration:none;
border-radius:5px;
}

</style>

</head>

<body>

<h1>My Orders</h1>

<table>

<tr>
<th>Order ID</th>
<th>Date</th>
<th>Payment</th>
<th>Amount</th>
<th>Status</th>
</tr>

{% for order in orders %}

<tr>

<td>
#{{ order.id }}
</td>

<td>
{{ order.order_date }}
</td>

<td>
{{ order.payment_method }}
</td>

<td>
₹ {{ order.total_amount }}
</td>

<td>
{{ order.status }}
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="{% url 'hotels' %}" class="btn">
Order More Food
</a>

</body>

</html>
