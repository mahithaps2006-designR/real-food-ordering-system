<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
background:blue;
color:white;
border:none;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Register</h2>

<form method="POST">

{% csrf_token %}

<input type="text"
name="username"
placeholder="Username"
required>

<input type="email"
name="email"
placeholder="Email"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

</div>

</body>
</html>
