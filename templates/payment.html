<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>
    <p style="text-align:center;color:gray;margin-bottom:15px;">
    Welcome, {{ customer.full_name }}
</p>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.payment-card{
    background:white;
    width:500px;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

.total-box{
    background:#f8f9fa;
    border-left:5px solid #4CAF50;
    padding:15px;
    margin-bottom:25px;
    border-radius:10px;
}

.total-box h2{
    color:#4CAF50;
}

.payment-option{
    margin-bottom:15px;
}

.payment-label{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px;
    border:2px solid #ddd;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.payment-label:hover{
    border-color:#667eea;
    background:#f5f7ff;
}

.payment-label input{
    transform:scale(1.3);
}

.icon{
    font-size:24px;
}

.method-name{
    font-size:18px;
    font-weight:600;
}

.pay-btn{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.pay-btn:hover{
    background:#388E3C;
}

.secure{
    text-align:center;
    margin-top:15px;
    color:#777;
    font-size:14px;
}

</style>
</head>

<body>

<div class="payment-card">

    <h1>💳 Payment</h1>

    <div class="total-box">
        <h2>Total Amount: ₹ {{ total }}</h2>
    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="payment-option">
            <label class="payment-label">

                <input
                    type="radio"
                    name="payment_method"
                    value="Cash On Delivery"
                    required>

                <span class="icon">💵</span>

                <span class="method-name">
                    Cash On Delivery
                </span>

            </label>
        </div>

        <div class="payment-option">
            <label class="payment-label">

                <input
                    type="radio"
                    name="payment_method"
                    value="UPI">

                <span class="icon">📱</span>

                <span class="method-name">
                    UPI Payment
                </span>

            </label>
        </div>

        <div class="payment-option">
            <label class="payment-label">

                <input
                    type="radio"
                    name="payment_method"
                    value="Card">

                <span class="icon">💳</span>

                <span class="method-name">
                    Debit / Credit Card
                </span>

            </label>
        </div>

        <button type="submit" class="pay-btn">
            Place Order
        </button>

    </form>

    <p class="secure">
        🔒 Your payment information is secure.
    </p>

</div>

</body>
</html>
