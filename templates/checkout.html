<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{
width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:30px;
box-shadow:0 0 10px gray;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
background:green;
color:white;
border:none;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Delivery Details</h2>

<form method="POST">

{% csrf_token %}

<input type="text"
name="full_name"
placeholder="Full Name"
value="{{ customer.full_name|default:'' }}"
required>

<input type="text"
name="phone"
placeholder="Phone Number"
value="{{ customer.phone|default:'' }}"
required>

<textarea
name="address"
placeholder="Address"
required>{{ customer.address|default:'' }}</textarea>

<input type="text"
name="city"
placeholder="City"
value="{{ customer.city|default:'' }}"
required>

<input type="text"
name="pincode"
placeholder="Pincode"
value="{{ customer.pincode|default:'' }}"
required>

<button type="submit">
Continue To Payment
</button>

</form>

</div>

</body>
</html>
